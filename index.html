        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                min-height: 100vh;
                background: linear-gradient(135deg, #0f2b47 0%, #1a3c5e 40%, #0d4a4a 100%);
                color: #e0f7ff;
                font-family: 'Segoe UI', system-ui, sans-serif;
                overflow-x: hidden;
                position: relative;
            }

            /* Частицы */
            .particles {
                position: fixed;
                inset: 0;
                pointer-events: none;
                z-index: -1;
                overflow: hidden;
            }

            .particle {
                position: absolute;
                bottom: -40px;
                left: var(--left);
                width: var(--size);
                height: var(--size);
                background: radial-gradient(circle at 30% 30%, rgba(103,232,249,1), rgba(16,185,129,0.7) 50%, transparent 90%);
                border-radius: 50%;
                box-shadow: 0 0 25px rgba(103,232,249,0.9), 0 0 45px rgba(103,232,249,0.7), 0 0 70px rgba(16,185,129,0.5);
                opacity: 0;
                animation: rise var(--duration) linear forwards;
                animation-delay: var(--delay);
            }

            @keyframes rise {
                0% {
                    transform: translateY(0) scale(0.5);
                    opacity: 0;
                }

                6% {
                    opacity: 1;
                }

                80% {
                    opacity: 1;
                }

                92% {
                    opacity: 0.3;
                }

                100% {
                    transform: translateY(-110vh) scale(0.3);
                    opacity: 0;
                }
            }

            .container {
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                padding: 3.5vh 3vw 5vh;
                gap: 4vh;
                position: relative;
                z-index: 1;
            }

            .title-outer {
                width: 100%;
                max-width: 98vw;
                text-align: center;
                padding: 1.5vh 0 0.5vh;
            }

            .main-title {
                font-size: clamp(3rem, 9vw, 10.5rem);
                font-weight: 900;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                display: inline-block;
                background: linear-gradient(90deg, #a5f3fc, #67e8f9, #a5f3fc, #7dd3fc);
                -webkit-background-clip: text;
                background-clip: text;
                -webkit-text-fill-color: transparent;
                background-size: 300% 100%;
                animation: shine 10s linear infinite;
                text-shadow: 0 0 15px rgba(103, 232, 249, 0.8), 0 0 35px rgba(103, 232, 249, 0.5);
                filter: drop-shadow(0 5px 18px rgba(16, 185, 129, 0.6));
                user-select: none;
                white-space: nowrap;
            }

            @keyframes shine {
                0% {
                    background-position: 0% 50%;
                }

                50% {
                    background-position: 100% 50%;
                }

                100% {
                    background-position: 0% 50%;
                }
            }

            .section-title {
                font-size: 1.25rem;
                color: #67e8f9;
                text-align: center;
                margin: 1.2rem 0 0.8rem 0;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                opacity: 0.85;
            }

            .buttons {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem 1.5rem;
                max-width: 1100px;
                width: 96vw;
            }

            .fake-btn {
                width: 245px;
                height: 4.4rem;
                padding: 0.5rem 0.9rem;
                font-size: clamp(0.9rem, 3vw, 1.08rem);
                font-weight: bold;
                text-transform: uppercase;
                letter-spacing: 0.04em;
                color: #e0f7ff;
                background: linear-gradient(135deg, rgba(16, 185, 129, 0.18), rgba(103, 232, 249, 0.12));
                border: 2px solid rgba(16, 185, 129, 0.6);
                border-radius: 12px;
                box-shadow: 0 0 18px rgba(16, 185, 129, 0.4);
                backdrop-filter: blur(8px);
                transition: all 0.3s ease;
                cursor: pointer;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.3rem;
                animation: borderPulse 6s ease-in-out infinite;
            }

            @keyframes borderPulse {
                0%, 100% {
                    border-color: rgba(16, 185, 129, 0.6);
                }

                50% {
                    border-color: rgba(103, 232, 249, 0.9);
                }
            }

            .fake-btn:hover {
                transform: translateY(-5px) scale(1.03);
                background: linear-gradient(135deg, rgba(16, 185, 129, 0.32), rgba(103, 232, 249, 0.22));
                border-color: #67e8f9;
                box-shadow: 0 0 40px rgba(103, 232, 249, 0.75);
            }

            .btn-icon {
                width: 2.05em;
                height: 2.05em;
                flex-shrink: 0;
                transition: all 0.3s ease;
            }

            .fake-btn:hover .btn-icon {
                filter: brightness(1.45) drop-shadow(0 0 10px #67e8f9);
                transform: scale(1.12);
            }

            .link-btn {
                text-decoration: none;
                color: inherit;
                width: 100%;

                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 0.3rem;
            }

            /* Разделитель */
            .separator {
                width: 100%;
                max-width: 580px;
                height: 2px;
                background: linear-gradient(90deg, transparent, #67e8f9, transparent);
                box-shadow: 0 0 16px rgba(103, 232, 249, 0.6);
                margin: 1.6rem 0 1.8rem 0;
                position: relative;
            }

                .separator::before {
                    content: '';
                    position: absolute;
                    top: -5px;
                    left: 50%;
                    transform: translateX(-50%);

                    background: #67e8f9;

                    height: 4.2rem;
                }
            }

        <script>
            function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';

            const size = Math.random() * 8 + 6;
            const leftPos = Math.random() * 100;
            const duration = Math.random() * 20 + 16;

            particle.style.setProperty('--size', size + 'px');
            particle.style.setProperty('--left', leftPos + '%');
            particle.style.setProperty('--duration', duration + 's');
            particle.style.setProperty('--delay', (Math.random() * -duration) + 's');

            document.getElementById('particles').appendChild(particle);

            setTimeout(() => {
            if (particle && particle.parentNode) particle.parentNode.removeChild(particle);
            }, (duration + 2) * 1000);
            }

            function initParticles() {
            for (let i = 0; i < 26; i++) {
            setTimeout(createParticle, i * 90);
            }
            }

            window.addEventListener('load', initParticles);
            setInterval(createParticle, 650);
        </script>
